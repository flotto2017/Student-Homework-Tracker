<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Homework Tracker</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDN (Version 18) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Prop-Types (Mandatory for Recharts UMD) -->
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <!-- Recharts CDN (Version 2.x) -->
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700;800&display=swap');
        body { font-family: 'Sarabun', sans-serif; }
        #root { min-height: 100vh; }
        .recharts-responsive-container { min-height: 250px; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .loader-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #f8fafc;
        }
        @keyframes pulse-slow {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }
        .animate-pulse-slow {
            animation: pulse-slow 3s infinite;
        }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root">
        <div class="loader-container">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600"></div>
            <p class="mt-4 text-slate-500 font-bold">กำลังเริ่มต้นระบบ...</p>
        </div>
    </div>

    <!-- Firebase SDK (Compatibility Version for HTML) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // ==========================================
        // 1. SETTINGS & CONFIGURATION
        // ==========================================
        const SETTINGS = {
            themeColor: "indigo",
        };

        const MY_FIREBASE_CONFIG = {
            apiKey: "AIzaSyDdNnQA-pkFWGTLlUxM4s1HkKhmQ2zqDNA",
            authDomain: "student-homework-tracker-b86de.firebaseapp.com",
            projectId: "student-homework-tracker-b86de",
            storageBucket: "student-homework-tracker-b86de.firebasestorage.app",
            messagingSenderId: "878355896505",
            appId: "1:878355896505:web:1acc4d24af5d57db766368",
            measurementId: "G-D178FEY7BG"
        };

        const formatDateLocal = (date) => {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        };

        // ==========================================
        // 2. SHARED COMPONENTS (ICONS)
        // ==========================================
        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                award: <path d="m15.477 12.89 1.515 8.526a.5.5 0 0 1-.81.47l-3.58-2.687a1 1 0 0 0-1.197 0l-3.586 2.686a.5.5 0 0 1-.81-.469l1.514-8.526" />,
                abacus: <React.Fragment><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M6 5v14M12 5v14M18 5v14"/><circle cx="6" cy="9" r="1.5"/><circle cx="6" cy="15" r="1.5"/><circle cx="12" cy="11" r="1.5"/><circle cx="18" cy="13" r="1.5"/></React.Fragment>,
                user: <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" />,
                child: <React.Fragment><circle cx="12" cy="8" r="4"/><path d="M12 12v1a4 4 0 0 0-4 4v3h8v-3a4 4 0 0 0-4-4Z"/><path d="M10 2c-.5 1-1 2-1 3a3 3 0 0 0 6 0c0-1-.5-2-1-3"/></React.Fragment>,
                lock: <rect width="18" height="11" x="3" y="11" rx="2" ry="2" />,
                key: <React.Fragment><circle cx="7.5" cy="15.5" r="5.5"/><path d="m21 2-9.6 9.6"/><path d="m15.5 7.5 3 3"/></React.Fragment>,
                trash: <path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" />,
                settings: <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z" />,
                logout: <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9" />,
                calendar: <rect width="18" height="18" x="3" y="4" rx="2" ry="2" />,
                edit: <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z" />,
                x: <path d="M18 6 6 18M6 6l12 12" />,
                alert: <path d="M12 8v4M12 16h.01M22 12c0 5.523-4.477 10-10 10S2 17.523 2 12 6.477 2 12 2s10 4.477 10 10z" />,
                loader: <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83" />,
                trending: <polyline points="23 6 13.5 15.5 8.5 10.5 1 18" />,
                checkCircle: <React.Fragment><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01" /></React.Fragment>,
                clipboard: <React.Fragment><rect x="8" y="2" width="8" height="4" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/></React.Fragment>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || <circle cx="12" cy="12" r="10" />}
                </svg>
            );
        };

        // ==========================================
        // 3. MAIN APPLICATION COMPONENT
        // ==========================================
        const App = () => {
            const [user, setUser] = useState(null);
            const [isAuthLoading, setIsAuthLoading] = useState(true);
            const [view, setView] = useState('login'); 
            const [activeStudent, setActiveStudent] = useState(null);
            const [students, setStudents] = useState([]);
            const [scores, setScores] = useState([]);
            
            const [formLogin, setFormLogin] = useState({ u: '', p: '' });
            const [inputName, setInputName] = useState('');
            const [inputDob, setInputDob] = useState('');
            const [inputStartDate, setInputStartDate] = useState(formatDateLocal(new Date()));
            
            const [bulkInput, setBulkInput] = useState('');
            
            const [inputScoreDate, setInputScoreDate] = useState(formatDateLocal(new Date()));
            const [inputScoreVal, setInputScoreVal] = useState('');
            const [inputScoreNote, setInputScoreNote] = useState('');
            const [editingScoreId, setEditingScoreId] = useState(null);
            
            const [showDeleteModal, setShowDeleteModal] = useState(null);
            const [statusErr, setStatusErr] = useState('');
            const [statusOk, setStatusOk] = useState('');
            const [isWorking, setIsWorking] = useState(false);
            const [firebaseReady, setFirebaseReady] = useState(false);

            const currentAppId = typeof __app_id !== 'undefined' ? __app_id : 'homework-tracker-v1';

            useEffect(() => {
                const init = async () => {
                    try {
                        let config = MY_FIREBASE_CONFIG;
                        if (typeof __firebase_config !== 'undefined' && __firebase_config !== "") {
                            config = JSON.parse(__firebase_config);
                        }
                        if (!config.apiKey) {
                            setStatusErr("ยังไม่ได้ตั้งค่า Firebase API Key");
                            setIsAuthLoading(false);
                            return;
                        }
                        if (!firebase.apps.length) firebase.initializeApp(config);
                        const auth = firebase.auth();
                        
                        const token = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;
                        if (token) {
                            await auth.signInWithCustomToken(token);
                        } else {
                            await auth.signInAnonymously();
                        }
                        
                        auth.onAuthStateChanged(u => {
                            setUser(u);
                            setFirebaseReady(true);
                            setIsAuthLoading(false);
                        });
                    } catch (e) {
                        setStatusErr("Firebase Error: " + e.message);
                        setIsAuthLoading(false);
                    }
                };
                init();
            }, []);

            useEffect(() => {
                if (!firebaseReady || !user || view !== 'admin') {
                    setStudents([]);
                    return;
                }
                const db = firebase.firestore();
                const pathPrefix = `artifacts/${currentAppId}/public/data`;
                return db.collection(`${pathPrefix}/students`).onSnapshot(s => {
                    setStudents(s.docs.map(d => ({ id: d.id, ...d.data() })));
                });
            }, [firebaseReady, user, view]);

            useEffect(() => {
                if (!firebaseReady || !user || !activeStudent) {
                    setScores([]);
                    return;
                }
                const db = firebase.firestore();
                const pathPrefix = `artifacts/${currentAppId}/public/data`;
                return db.collection(`${pathPrefix}/scores`)
                    .where('studentId', '==', activeStudent.id)
                    .onSnapshot(s => {
                        setScores(s.docs.map(d => ({ id: d.id, ...d.data() })));
                    });
            }, [firebaseReady, user, activeStudent]);

            // ==========================================
            // 4. CALCULATIONS
            // ==========================================
            const missingSubmissions = useMemo(() => {
                if (!activeStudent) return [];
                const missing = [];
                const today = new Date();
                today.setHours(0, 0, 0, 0);

                const parts = activeStudent.startDate ? activeStudent.startDate.split('-') : [];
                const startLimit = parts.length === 3 
                    ? new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]))
                    : new Date(today.getTime() - (14 * 24 * 60 * 60 * 1000));
                
                startLimit.setHours(0, 0, 0, 0);

                let checkDate = new Date(today);
                while (checkDate >= startLimit) {
                    const dayOfWeek = checkDate.getDay();
                    const dateStr = formatDateLocal(checkDate);
                    
                    const isWorkDay = (dayOfWeek !== 0 && dayOfWeek !== 6);
                    
                    if (isWorkDay) {
                        const hasSubmitted = scores.some(s => s.date === dateStr);
                        if (!hasSubmitted) {
                            missing.push({
                                dateStr,
                                label: checkDate.toLocaleDateString('th-TH', { day: 'numeric', month: 'short', weekday: 'short' })
                            });
                        }
                    }
                    checkDate.setDate(checkDate.getDate() - 1);
                    if (missing.length > 30) break; 
                }
                return missing;
            }, [scores, activeStudent]);

            const myData = useMemo(() => {
                return scores.sort((a,b) => new Date(a.date) - new Date(b.date))
                    .map(s => ({ d: new Date(s.date).toLocaleDateString('th-TH', {day:'numeric', month:'short'}), v: s.score }));
            }, [scores]);

            const myStats = useMemo(() => {
                const list = scores.filter(s => s.studentId === activeStudent?.id);
                if (!list.length) return { a: 0, t: 0, m: 0 };
                return {
                    a: (list.reduce((acc, c) => acc + c.score, 0) / list.length).toFixed(1),
                    t: list.length,
                    m: Math.max(...list.map(s => s.score))
                };
            }, [scores, activeStudent]);

            // ==========================================
            // 5. EVENT HANDLERS
            // ==========================================
            const doLogin = async (e) => {
                e.preventDefault();
                setStatusErr('');
                setIsWorking(true);
                const uInput = formLogin.u.trim();
                const pInput = formLogin.p.trim();

                if (!firebaseReady) {
                    setStatusErr("ระบบยังไม่พร้อม กรุณารอสักครู่");
                    setIsWorking(false);
                    return;
                }

                try {
                    const db = firebase.firestore();
                    const pathPrefix = `artifacts/${currentAppId}/public/data`;

                    const adminCheck = await db.collection(`${pathPrefix}/admins`)
                        .where('username', '==', uInput) 
                        .get();
                    
                    const adminDoc = adminCheck.docs.find(doc => doc.data().password === pInput);
                    
                    if (adminDoc) {
                        setView('admin');
                        setIsWorking(false);
                        return;
                    }

                    const studentCheck = await db.collection(`${pathPrefix}/students`)
                        .where('name', '==', uInput)
                        .get();

                    const studentDoc = studentCheck.docs.find(doc => doc.data().dob === pInput);

                    if (studentDoc) {
                        const sData = { id: studentDoc.id, ...studentDoc.data() };
                        setActiveStudent(sData);
                        setView('parent');
                    } else {
                        setStatusErr('ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง');
                    }
                } catch (err) {
                    console.error("Login Error:", err);
                    setStatusErr('เกิดข้อผิดพลาด: ' + err.message);
                }
                setIsWorking(false);
            };

            const saveNewStudent = async (e) => {
                e.preventDefault();
                if (!inputName || !inputDob || !inputStartDate) return;
                setIsWorking(true);
                try {
                    await firebase.firestore().collection(`artifacts/${currentAppId}/public/data/students`).add({
                        name: inputName.trim(), 
                        dob: inputDob.trim(), 
                        startDate: inputStartDate,
                        createdAt: new Date().toISOString()
                    });
                    setInputName(''); setInputDob(''); setStatusOk('ลงทะเบียนสำเร็จ');
                    setTimeout(() => setStatusOk(''), 3000);
                } catch (e) { setStatusErr(e.message); }
                setIsWorking(false);
            };

            const handleBulkImport = async () => {
                if (!bulkInput.trim()) return;
                setIsWorking(true);
                setStatusOk('');
                setStatusErr('');
                
                try {
                    const db = firebase.firestore();
                    const batch = db.batch();
                    const colRef = db.collection(`artifacts/${currentAppId}/public/data/students`);
                    
                    const rows = bulkInput.trim().split('\n');
                    let count = 0;
                    
                    rows.forEach(row => {
                        const cols = row.split('\t');
                        if (cols.length >= 2) {
                            const name = cols[0]?.trim();
                            const dob = cols[1]?.trim();
                            const startDate = cols[2]?.trim() || formatDateLocal(new Date());
                            
                            if (name && dob) {
                                const newDoc = colRef.doc();
                                batch.set(newDoc, {
                                    name,
                                    dob,
                                    startDate,
                                    createdAt: new Date().toISOString()
                                });
                                count++;
                            }
                        }
                    });
                    
                    if (count > 0) {
                        await batch.commit();
                        setStatusOk(`นำเข้าสำเร็จ ${count} รายชื่อ`);
                        setBulkInput('');
                        setTimeout(() => setStatusOk(''), 5000);
                    } else {
                        setStatusErr("ไม่พบข้อมูลที่ถูกต้องในรูปแบบที่กำหนด");
                    }
                } catch (e) {
                    setStatusErr("Error: " + e.message);
                }
                setIsWorking(false);
            };

            const handleSaveOrUpdateScore = async (e) => {
                e.preventDefault();
                if (!inputScoreVal || isWorking) return;
                setIsWorking(true);
                try {
                    const db = firebase.firestore();
                    const col = db.collection(`artifacts/${currentAppId}/public/data/scores`);
                    const scoreData = {
                        studentId: activeStudent.id, 
                        date: inputScoreDate,
                        score: parseFloat(inputScoreVal), 
                        note: inputScoreNote, 
                        updatedAt: new Date().toISOString()
                    };
                    if (editingScoreId) {
                        await col.doc(editingScoreId).update(scoreData);
                        setStatusOk('อัปเดตสำเร็จ'); 
                        setEditingScoreId(null);
                    } else {
                        scoreData.timestamp = new Date().toISOString();
                        await col.add(scoreData);
                        setStatusOk('บันทึกแล้ว');
                    }
                    setInputScoreVal(''); setInputScoreNote('');
                    setTimeout(() => setStatusOk(''), 3000);
                } catch (e) { setStatusErr(e.message); }
                setIsWorking(false);
            };

            const confirmDelete = async () => {
                if (!showDeleteModal || isWorking) return;
                setIsWorking(true);
                try {
                    await firebase.firestore().collection(`artifacts/${currentAppId}/public/data/scores`).doc(showDeleteModal).delete();
                    setStatusOk('ลบข้อมูลเรียบร้อย');
                    setShowDeleteModal(null);
                    setTimeout(() => setStatusOk(''), 3000);
                } catch (e) { setStatusErr(e.message); }
                setIsWorking(false);
            };

            const startEdit = (s) => {
                setEditingScoreId(s.id); 
                setInputScoreDate(s.date);
                setInputScoreVal(s.score); 
                setInputScoreNote(s.note || '');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const mainCol = `text-${SETTINGS.themeColor}-600`;
            const bgCol = `bg-${SETTINGS.themeColor}-600`;

            if (isAuthLoading) return (
                <div className="loader-container">
                    <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600"></div>
                    <p className="mt-4 text-slate-500 font-bold">กำลังเริ่มต้นระบบ...</p>
                </div>
            );

            const { AreaChart, Area, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer } = window.Recharts || {};

            return (
                <div className="min-h-screen">
                    {showDeleteModal && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
                            <div className="bg-white rounded-3xl p-8 max-w-sm w-full shadow-2xl">
                                <div className="text-center">
                                    <div className="bg-rose-50 p-4 rounded-full text-rose-500 inline-block mb-4"><Icon name="alert" size={32} /></div>
                                    <h3 className="text-xl font-black mb-2">ยืนยันการลบ?</h3>
                                    <p className="text-slate-500 text-sm mb-6">ข้อมูลนี้จะถูกลบออกถาวร</p>
                                    <div className="flex gap-3">
                                        <button onClick={confirmDelete} className="flex-1 bg-rose-600 text-white py-3 rounded-xl font-bold">ลบ</button>
                                        <button onClick={() => setShowDeleteModal(null)} className="flex-1 bg-slate-100 text-slate-600 py-3 rounded-xl font-bold">ยกเลิก</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {view === 'login' && (
                        <div className="min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
                            <div className="w-full max-w-md bg-white rounded-[2.5rem] shadow-2xl p-10 border border-white z-10">
                                <div className="text-center mb-8">
                                    <div className={`${bgCol} w-20 h-20 rounded-3xl flex items-center justify-center mx-auto mb-4 text-white shadow-xl`}><Icon name="abacus" size={40} /></div>
                                    <h1 className="text-2xl font-black text-slate-800">Homework Tracker</h1>
                                </div>
                                <form onSubmit={doLogin} className="space-y-4">
                                    <div className="relative">
                                        <Icon name="child" className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300" />
                                        <input type="text" className="w-full pl-12 pr-4 py-4 bg-slate-50 rounded-2xl outline-none border focus:border-indigo-500 font-bold" placeholder="Username" value={formLogin.u} onChange={(e)=>setFormLogin({...formLogin, u: e.target.value})} />
                                    </div>
                                    <div className="relative">
                                        <Icon name="key" className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300" />
                                        <input type="password" className="w-full pl-12 pr-4 py-4 bg-slate-50 rounded-2xl outline-none border focus:border-indigo-500 font-bold" placeholder="Password" value={formLogin.p} onChange={(e)=>setFormLogin({...formLogin, p: e.target.value})} />
                                    </div>
                                    {statusErr && <div className="text-rose-500 text-xs font-bold text-center bg-rose-50 p-3 rounded-xl border border-rose-100">{statusErr}</div>}
                                    <button disabled={isWorking} className={`w-full ${bgCol} text-white py-5 rounded-2xl font-black shadow-lg uppercase transition-all flex items-center justify-center active:scale-95 disabled:opacity-50`}>
                                        {isWorking ? <Icon name="loader" className="animate-spin" size={24}/> : "เข้าสู่ระบบ"}
                                    </button>
                                </form>
                            </div>
                            {/* Updated Credit Section */}
                            <div className="absolute bottom-6 right-8 text-slate-500 text-sm font-bold text-right z-20 pointer-events-none select-none">
                                <p>สร้างโดย KF</p>
                                <p className="text-[10px] opacity-70 tracking-wider">Line ID: prawitf</p>
                            </div>
                        </div>
                    )}

                    {view === 'admin' && (
                        <div>
                            <nav className="bg-white px-6 py-4 flex justify-between items-center shadow-sm sticky top-0 z-50">
                                <div className={`flex items-center gap-2 ${mainCol}`}><Icon name="settings" /> <span className="font-black">โหมดคุณครู</span></div>
                                <button onClick={() => { setView('login'); setActiveStudent(null); }} className="text-slate-400 font-bold text-sm">ออกจากระบบ</button>
                            </nav>
                            <main className="max-w-6xl mx-auto p-4 md:p-8 space-y-6">
                                <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                                    <div className="lg:col-span-4 space-y-6">
                                        <div className="bg-white p-8 rounded-[2rem] shadow-sm border">
                                            <h3 className="font-black mb-4 flex items-center gap-2 text-slate-800"><Icon name="user" size={18}/> ลงทะเบียนรายคน</h3>
                                            <form onSubmit={saveNewStudent} className="space-y-4">
                                                <input className="w-full p-3 bg-slate-50 rounded-xl outline-none border font-bold text-sm" placeholder="ชื่อเล่นนักเรียน" value={inputName} onChange={(e)=>setInputName(e.target.value)} />
                                                <input className="w-full p-3 bg-slate-50 rounded-xl outline-none border font-bold text-sm" placeholder="รหัสผ่าน (เช่น วันเกิด)" value={inputDob} onChange={(e)=>setInputDob(e.target.value)} />
                                                <div>
                                                    <label className="text-[10px] font-bold text-slate-400 uppercase ml-1">วันที่เริ่มบันทึก</label>
                                                    <input type="date" className="w-full p-3 bg-slate-50 rounded-xl outline-none border font-bold text-sm" value={inputStartDate} onChange={(e)=>setInputStartDate(e.target.value)} />
                                                </div>
                                                <button disabled={isWorking} className="w-full bg-slate-900 text-white py-3 rounded-xl font-bold active:scale-95 transition-all">บันทึกรายคน</button>
                                            </form>
                                        </div>

                                        <div className="bg-indigo-50 p-8 rounded-[2rem] shadow-sm border border-indigo-100">
                                            <h3 className="font-black mb-1 flex items-center gap-2 text-indigo-900"><Icon name="clipboard" size={18}/> นำเข้าจาก Excel</h3>
                                            <p className="text-[10px] text-indigo-400 font-bold mb-4 uppercase tracking-tighter">Copy จาก Excel (ชื่อ [Tab] รหัส [Tab] วันที่) มาวางได้เลย</p>
                                            <textarea 
                                                className="w-full h-32 p-3 bg-white rounded-xl outline-none border border-indigo-100 font-mono text-xs mb-3 custom-scrollbar"
                                                placeholder="ตัวอย่าง:&#10;น้องเอ	010155	2024-03-01&#10;น้องบี	020255	2024-03-05"
                                                value={bulkInput}
                                                onChange={(e) => setBulkInput(e.target.value)}
                                            ></textarea>
                                            <button 
                                                onClick={handleBulkImport}
                                                disabled={isWorking || !bulkInput.trim()} 
                                                className="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold active:scale-95 transition-all disabled:opacity-50"
                                            >
                                                {isWorking ? "กำลังประมวลผล..." : "นำเข้าข้อมูลชุดใหญ่"}
                                            </button>
                                        </div>
                                    </div>
                                    
                                    <div className="lg:col-span-8 bg-white rounded-[2rem] shadow-sm border overflow-hidden">
                                        <div className="p-6 border-b font-black text-slate-800 flex justify-between items-center bg-slate-50/50">
                                            <span>รายชื่อนักเรียนทั้งหมด ({students.length})</span>
                                            {statusOk && <span className="text-emerald-500 font-bold text-xs animate-bounce">{statusOk}</span>}
                                            {statusErr && <span className="text-rose-500 font-bold text-xs">{statusErr}</span>}
                                        </div>
                                        <div className="divide-y max-h-[600px] overflow-y-auto custom-scrollbar">
                                            {students.length === 0 ? (
                                                <div className="p-10 text-center text-slate-300 italic font-bold">ยังไม่มีข้อมูลนักเรียนในระบบ</div>
                                            ) : (
                                                students.sort((a,b) => a.name.localeCompare(b.name)).map(s => (
                                                    <div key={s.id} className="p-4 flex justify-between items-center hover:bg-slate-50 transition-colors">
                                                        <div className="flex flex-col">
                                                            <span className="font-bold text-slate-700">{s.name}</span>
                                                            <span className="text-[10px] text-slate-400 font-bold">Pass: {s.dob}</span>
                                                        </div>
                                                        <div className="flex items-center gap-4 text-right">
                                                            <div className="flex flex-col">
                                                                <span className="text-[8px] font-black text-slate-300 uppercase">Started</span>
                                                                <span className="text-[10px] font-black text-indigo-400">{s.startDate || '-'}</span>
                                                            </div>
                                                            <button onClick={()=>{
                                                                if(window.confirm(`ยืนยันลบชื่อ ${s.name}?`)) {
                                                                    firebase.firestore().collection(`artifacts/${currentAppId}/public/data/students`).doc(s.id).delete();
                                                                }
                                                            }} className="text-slate-200 hover:text-rose-500 transition-colors"><Icon name="trash" size={18} /></button>
                                                        </div>
                                                    </div>
                                                ))
                                            )}
                                        </div>
                                    </div>
                                </div>
                            </main>
                        </div>
                    )}

                    {view === 'parent' && (
                        <div>
                            <nav className="bg-white px-6 py-4 flex justify-between items-center shadow-sm sticky top-0 z-50">
                                <div className="flex items-center gap-3 font-black"><Icon name="award" className={mainCol} /> <span>{activeStudent?.name}</span></div>
                                <button onClick={() => { setView('login'); setActiveStudent(null); }} className="text-slate-300"><Icon name="logout" /></button>
                            </nav>
                            <main className="max-w-5xl mx-auto p-4 md:p-8 space-y-6">
                                {missingSubmissions.length > 0 ? (
                                    <div className="bg-rose-50 border border-rose-100 p-6 rounded-[2rem] flex flex-col md:flex-row items-center gap-4 shadow-sm animate-pulse-slow">
                                        <div className="bg-rose-100 p-3 rounded-2xl text-rose-600"><Icon name="alert" size={32} /></div>
                                        <div>
                                            <h3 className="text-rose-900 font-black text-lg uppercase tracking-tight">ตรวจพบงานค้างส่ง {missingSubmissions.length} รายการ</h3>
                                            <p className="text-rose-600 text-sm font-bold opacity-80">วันที่ขาด (จ.-ศ.): {missingSubmissions.map(m => m.label).join(', ')}</p>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="bg-emerald-50 border border-emerald-100 p-6 rounded-[2rem] flex items-center gap-4 shadow-sm">
                                        <div className="bg-emerald-100 p-3 rounded-2xl text-emerald-600"><Icon name="checkCircle" size={32} /></div>
                                        <div>
                                            <h3 className="text-emerald-900 font-black text-lg uppercase tracking-tight">ยอดเยี่ยม! ส่งงานครบถ้วนแล้ว</h3>
                                            <p className="text-emerald-600 text-sm font-bold opacity-80">คุณบันทึกคะแนนครบทุกวันทำการ ตั้งแต่วันเริ่มบันทึก ({activeStudent?.startDate})</p>
                                        </div>
                                    </div>
                                )}

                                <div className="grid grid-cols-2 lg:grid-cols-3 gap-4">
                                    <div className="bg-white p-6 rounded-[2rem] border shadow-sm"><p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">เฉลี่ย</p><span className={`text-4xl font-black ${mainCol}`}>{myStats.a}</span></div>
                                    <div className="bg-white p-6 rounded-[2rem] border shadow-sm"><p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">บันทึกแล้ว</p><span className="text-4xl font-black text-slate-800">{myStats.t}</span></div>
                                    <div className={`${bgCol} p-6 rounded-[2rem] text-white flex justify-between items-center shadow-lg`}><div><p className="text-[10px] font-black opacity-60 uppercase tracking-widest">สูงสุด</p><span className="text-4xl font-black">{myStats.m}</span></div><Icon name="trending" size={32} className="opacity-30" /></div>
                                </div>

                                <div className="bg-white p-6 rounded-[2rem] border shadow-sm">
                                    <h2 className="font-black mb-6 text-slate-800">พัฒนาการคะแนน</h2>
                                    <div className="h-[250px] w-full">
                                        {scores.length > 0 ? (
                                            <ResponsiveContainer><AreaChart data={myData}><CartesianGrid vertical={false} stroke="#f1f5f9" /><XAxis dataKey="d" axisLine={false} tickLine={false} tick={{fontSize:10, fontWeight:700, fill:'#94a3b8'}} /><YAxis domain={[0,200]} axisLine={false} tickLine={false} tick={{fontSize:10, fill:'#cbd5e1'}} /><Tooltip contentStyle={{borderRadius:'1rem', border:'none', boxShadow:'0 20px 25px -5px rgb(0 0 0 / 0.1)'}} /><Area type="monotone" dataKey="v" stroke="#4f46e5" strokeWidth={4} fillOpacity={0.1} fill="#4f46e5" /></AreaChart></ResponsiveContainer>
                                        ) : <div className="h-full flex items-center justify-center text-slate-300 italic font-bold">เริ่มบันทึกคะแนนเพื่อแสดงกราฟ</div>}
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-5 gap-6">
                                    <div className="lg:col-span-2 bg-white p-8 rounded-[2.5rem] border shadow-sm">
                                        <h2 className="font-black mb-6 flex items-center gap-2 text-slate-800"><Icon name="calendar" className={mainCol} /> {editingScoreId ? "แก้ไขคะแนน" : "บันทึกคะแนน"}</h2>
                                        <form onSubmit={handleSaveOrUpdateScore} className="space-y-4">
                                            <input type="date" className="w-full p-4 bg-slate-50 rounded-xl font-bold border outline-none focus:border-indigo-500 transition-all" value={inputScoreDate} onChange={(e)=>setInputScoreDate(e.target.value)} />
                                            <input type="number" step="0.1" className={`w-full p-4 bg-indigo-50 rounded-xl text-4xl font-black text-center ${mainCol} border outline-none focus:border-indigo-500 transition-all`} placeholder="0.0" value={inputScoreVal} onChange={(e)=>setInputScoreVal(e.target.value)} />
                                            <input type="text" className="w-full p-4 bg-slate-50 rounded-xl font-bold text-sm border outline-none focus:border-indigo-500 transition-all" placeholder="วิชา / หมายเหตุ" value={inputScoreNote} onChange={(e)=>setInputScoreNote(e.target.value)} />
                                            {statusOk && <p className="text-emerald-500 text-center font-bold text-xs bg-emerald-50 p-2 rounded-lg">{statusOk}</p>}
                                            <div className="flex gap-2">
                                                <button className="flex-1 bg-slate-900 text-white py-4 rounded-2xl font-black shadow-lg hover:bg-slate-800 transition-all active:scale-95">{editingScoreId ? "อัปเดต" : "บันทึกคะแนน"}</button>
                                                {editingScoreId && <button type="button" onClick={()=>{setEditingScoreId(null); setInputScoreVal(''); setInputScoreNote('');}} className="bg-slate-100 p-4 rounded-2xl text-slate-500"><Icon name="x" size={20}/></button>}
                                            </div>
                                        </form>
                                    </div>
                                    <div className="lg:col-span-3 bg-white rounded-[2.5rem] border shadow-sm overflow-hidden h-[500px] flex flex-col">
                                        <div className="p-6 border-b font-black text-slate-800 flex justify-between items-center">
                                            <span>ประวัติย้อนหลัง</span>
                                            <span className="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Scroll</span>
                                        </div>
                                        <div className="flex-1 overflow-y-auto custom-scrollbar">
                                            {scores.length === 0 ? (
                                                <div className="p-10 text-center text-slate-300 italic font-bold">ยังไม่พบประวัติการบันทึก</div>
                                            ) : (
                                                scores.sort((a,b)=>new Date(b.date)-new Date(a.date)).map(s=>(
                                                    <div key={s.id} className="p-4 flex justify-between items-center border-b hover:bg-slate-50 group transition-all">
                                                        <div className="flex gap-4 items-center">
                                                            <div className="w-12 h-12 bg-slate-50 rounded-xl flex flex-col items-center justify-center text-[10px] font-black border group-hover:border-indigo-200">
                                                                <span className="text-sm font-black text-slate-700">{new Date(s.date).getDate()}</span>
                                                                <span className={mainCol}>{new Date(s.date).toLocaleDateString('th-TH', {month:'short'})}</span>
                                                            </div>
                                                            <div>
                                                                <p className="font-bold text-slate-700 text-sm line-clamp-1">{s.note || 'ไม่มีหมายเหตุ'}</p>
                                                                <div className="flex gap-3 mt-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                                                    <button onClick={() => startEdit(s)} className="text-indigo-500 text-[10px] font-bold hover:underline">แก้ไข</button>
                                                                    <button onClick={() => setShowDeleteModal(s.id)} className="text-rose-500 text-[10px] font-bold hover:underline">ลบ</button>
                                                                </div>
                                                            </div>
                                                        </div>
                                                        <span className={`text-2xl font-black ${mainCol}`}>{s.score}</span>
                                                    </div>
                                                ))
                                            )}
                                        </div>
                                    </div>
                                </div>
                            </main>
                        </div>
                    )}
                </div>
            );
        };

        window.onload = () => {
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        };
    </script>
</body>
</html>
