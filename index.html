    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700;800&family=Kanit:wght@500;700;800&display=swap');

        :root {
            --bg-1: #fef6ff;
            --bg-2: #eef7ff;
            --bg-3: #fffaf1;

            --card: rgba(255,255,255,0.72);
            --card-strong: rgba(255,255,255,0.84);
            --line: rgba(124, 92, 189, 0.14);

            --text-main: #4f466b;
            --text-soft: #7d7599;
            --text-faint: #a59fbc;

            --cyan: #7dd3fc;
            --pink: #f9a8d4;
            --violet: #c4b5fd;
            --lavender: #b8c0ff;
            --yellow: #fde68a;
            --mint: #a7f3d0;
            --danger: #fda4af;
            --success: #86efac;

            --shadow-soft: 0 12px 30px rgba(168, 150, 214, 0.16);
            --shadow-card: 0 14px 34px rgba(161, 146, 206, 0.14);
            --shadow-hover: 0 18px 40px rgba(163, 145, 210, 0.18);
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            min-height: 100%;
            margin: 0;
            padding: 0;
            font-family: 'Sarabun', sans-serif;
            color: var(--text-main);
            overflow-x: hidden;
            background:
                radial-gradient(circle at 12% 18%, rgba(249,168,212,0.35), transparent 18%),
                radial-gradient(circle at 88% 12%, rgba(125,211,252,0.34), transparent 20%),
                radial-gradient(circle at 50% 85%, rgba(196,181,253,0.30), transparent 24%),
                linear-gradient(135deg, var(--bg-1), var(--bg-2) 48%, var(--bg-3));
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image: radial-gradient(rgba(188, 176, 220, 0.20) 1px, transparent 1px);
            background-size: 24px 24px;
            opacity: 0.45;
            z-index: 0;
        }

        #root {
            position: relative;
            z-index: 1;
        }

        .display-font {
            font-family: 'Kanit', sans-serif;
        }

        .glass {
            background: var(--card);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.70);
            box-shadow: var(--shadow-soft);
        }

        .glass-strong {
            background: var(--card-strong);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.82);
            box-shadow: var(--shadow-card);
        }

        .neon-card {
            position: relative;
            overflow: hidden;
        }

        .neon-card::before {
            content: "";
            position: absolute;
            inset: -1px;
            border-radius: inherit;
            padding: 1px;
            background: linear-gradient(
                135deg,
                rgba(125,211,252,0.45),
                rgba(196,181,253,0.42),
                rgba(249,168,212,0.45)
            );
            -webkit-mask:
                linear-gradient(#fff 0 0) content-box,
                linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            opacity: 0.9;
        }

        .glow-cyan,
        .glow-pink,
        .glow-violet {
            box-shadow: var(--shadow-card);
        }

        .floating-blob {
            position: fixed;
            border-radius: 999px;
            filter: blur(26px);
            opacity: 0.45;
            pointer-events: none;
            z-index: 0;
        }

        .blob-1 {
            width: 220px;
            height: 220px;
            background: rgba(249,168,212,0.42);
            top: 5%;
            left: -50px;
            animation: floatBlob 14s ease-in-out infinite;
        }

        .blob-2 {
            width: 260px;
            height: 260px;
            background: rgba(125,211,252,0.34);
            right: -70px;
            top: 20%;
            animation: floatBlob 16s ease-in-out infinite;
        }

        .blob-3 {
            width: 200px;
            height: 200px;
            background: rgba(196,181,253,0.36);
            left: 14%;
            bottom: -30px;
            animation: floatBlob 18s ease-in-out infinite;
        }

        .blob-4 {
            width: 170px;
            height: 170px;
            background: rgba(167,243,208,0.24);
            right: 16%;
            bottom: 8%;
            animation: floatBlob 20s ease-in-out infinite;
        }

        .sparkle {
            position: absolute;
            width: 7px;
            height: 7px;
            background: rgba(255,255,255,0.9);
            border-radius: 999px;
            box-shadow: 0 0 10px rgba(255,255,255,0.8);
            opacity: 0.75;
            animation: sparkle 3.4s ease-in-out infinite;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(196,181,253,0.18);
            border-radius: 999px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, rgba(125,211,252,0.9), rgba(249,168,212,0.9));
            border-radius: 999px;
        }

        .glass-input {
            width: 100%;
            color: var(--text-main);
            background: rgba(255,255,255,0.72);
            border: 1px solid rgba(210, 199, 239, 0.75);
            outline: none;
            transition: all 0.22s ease;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.6);
        }

        .glass-input::placeholder {
            color: var(--text-soft);
        }

        .glass-input:focus {
            border-color: rgba(167,139,250,0.42);
            box-shadow: 0 0 0 4px rgba(196,181,253,0.22);
            background: rgba(255,255,255,0.92);
        }

        .neon-btn {
            position: relative;
            overflow: hidden;
            transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
        }

        .neon-btn:hover {
            transform: translateY(-1px);
            filter: brightness(1.02);
            box-shadow: var(--shadow-hover);
        }

        .neon-btn:active {
            transform: scale(0.98);
        }

        .neon-btn::after {
            content: "";
            position: absolute;
            top: 0;
            left: -120%;
            width: 70%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
            transform: skewX(-18deg);
            transition: left 0.65s ease;
        }

        .neon-btn:hover::after {
            left: 140%;
        }

        .gradient-text {
            background: linear-gradient(90deg, #7dd3fc, #a78bfa, #f9a8d4, #fcd34d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .card-hover {
            transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
        }

        .card-hover:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
            border-color: rgba(255,255,255,0.95);
        }

        .status-chip {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border-radius: 999px;
            padding: 8px 14px;
            font-size: 12px;
            font-weight: 800;
            letter-spacing: .06em;
            text-transform: uppercase;
        }

        .animate-float {
            animation: floatY 4.6s ease-in-out infinite;
        }

        .animate-float-delay {
            animation: floatY 5.6s ease-in-out infinite;
        }

        .animate-soft-pulse {
            animation: softPulse 3.8s ease-in-out infinite;
        }

        .animate-scale-in {
            animation: scaleIn 0.42s ease;
        }

        .score-glow {
            text-shadow: 0 0 12px rgba(196,181,253,0.35);
        }

        .bg-grid {
            background-image:
                linear-gradient(rgba(196,181,253,0.12) 1px, transparent 1px),
                linear-gradient(90deg, rgba(196,181,253,0.12) 1px, transparent 1px);
            background-size: 26px 26px;
        }

        .line-clamp-1 {
            overflow: hidden;
            display: -webkit-box;
            -webkit-box-orient: vertical;
            -webkit-line-clamp: 1;
        }

        .line-clamp-2 {
            overflow: hidden;
            display: -webkit-box;
            -webkit-box-orient: vertical;
            -webkit-line-clamp: 2;
        }

        .badge-hint {
            min-height: 42px;
        }

        .hint-fade {
            transition: opacity 0.22s ease, transform 0.22s ease;
        }

        .recharts-responsive-container {
            min-height: 280px;
        }

        @keyframes floatBlob {
            0%, 100% { transform: translateY(0px) translateX(0px) scale(1); }
            50% { transform: translateY(-10px) translateX(8px) scale(1.03); }
        }

        @keyframes floatY {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
        }

        @keyframes sparkle {
            0%, 100% { transform: scale(0.7); opacity: 0.25; }
            50% { transform: scale(1.12); opacity: 0.75; }
        }

        @keyframes softPulse {
            0%, 100% { box-shadow: 0 0 0 rgba(0,0,0,0), 0 0 18px rgba(196,181,253,0.10); }
            50% { box-shadow: 0 0 0 rgba(0,0,0,0), 0 0 26px rgba(249,168,212,0.12); }
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.97) translateY(8px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        @media (max-width: 768px) {
            .mobile-pad {
                padding-left: 16px;
                padding-right: 16px;
            }

            .floating-blob,
            .sparkle,
            .animate-float,
            .animate-float-delay,
            .animate-soft-pulse {
                animation: none !important;
            }

            .glass,
            .glass-strong {
                backdrop-filter: blur(6px);
                -webkit-backdrop-filter: blur(6px);
            }
        }
    </style>
</head>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const { AreaChart, Area, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer } = Recharts;

        // =========================

        const currentAppId = typeof __app_id !== 'undefined' ? __app_id : 'student-homework-tracker-b86de';

        const firebaseConfig = typeof __firebase_config !== 'undefined'

        // =========================
        // Utilities
        // =========================
        const getLocalDateString = (date = new Date()) => {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        };

        const formatThaiDate = (dateString) => {
            try {
                return new Date(dateString).toLocaleDateString('th-TH', {
                    day: 'numeric',
                    month: 'short',
                    year: 'numeric'
                });
            } catch {
                return dateString;
            }
        };

        const cn = (...classes) => classes.filter(Boolean).join(' ');

        // =========================
        // Sound Effects
        // =========================
        const useSoundFX = () => {
            const audioCtxRef = useRef(null);

            const ensureAudioContext = () => {
                if (!audioCtxRef.current) {
                    const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                    if (AudioContextClass) {
                        audioCtxRef.current = new AudioContextClass();
                    }
                }
                if (audioCtxRef.current && audioCtxRef.current.state === 'suspended') {
                    audioCtxRef.current.resume();
                }
                return audioCtxRef.current;
            };

            const tone = (freq = 440, duration = 0.08, type = 'sine', volume = 0.04, startTime = 0) => {
                const ctx = ensureAudioContext();
                if (!ctx) return;

                const now = ctx.currentTime + startTime;
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();

                osc.type = type;
                osc.frequency.setValueAtTime(freq, now);

                gain.gain.setValueAtTime(0.0001, now);
                gain.gain.exponentialRampToValueAtTime(volume, now + 0.01);
                gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);

                osc.connect(gain);
                gain.connect(ctx.destination);

                osc.start(now);
                osc.stop(now + duration + 0.02);
            };

            const playClick = () => {
                tone(520, 0.05, 'triangle', 0.03, 0);
                tone(690, 0.06, 'triangle', 0.025, 0.03);
            };

            const playSuccess = () => {
                tone(523, 0.08, 'sine', 0.04, 0);
                tone(659, 0.08, 'sine', 0.04, 0.08);
                tone(784, 0.12, 'sine', 0.05, 0.16);
            };

            const playDelete = () => {
                tone(300, 0.08, 'sawtooth', 0.035, 0);
                tone(210, 0.12, 'sawtooth', 0.03, 0.05);
            };

            const playLogin = () => {
                tone(440, 0.07, 'triangle', 0.035, 0);
                tone(587, 0.08, 'triangle', 0.035, 0.06);
                tone(784, 0.12, 'triangle', 0.045, 0.14);
            };

            const playError = () => {
                tone(220, 0.08, 'square', 0.035, 0);
                tone(180, 0.12, 'square', 0.035, 0.06);
            };

            return { playClick, playSuccess, playDelete, playLogin, playError };

        // =========================

                settings: <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z" />,

                    <React.Fragment>
                        <circle cx="12" cy="12" r="10" />
                        <circle cx="12" cy="12" r="6" />

                    </React.Fragment>
                ),
                star: <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" />,
                clipboard: <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2M9 2h6" />,

        // =========================
        // Decorative background stars
        // =========================
        const SparklesLayer = () => {
            const stars = [
                { left: '8%', top: '14%', delay: '0s' },
                { left: '18%', top: '32%', delay: '0.8s' },
                { left: '82%', top: '16%', delay: '1.4s' },
                { left: '72%', top: '36%', delay: '0.3s' },
                { left: '30%', top: '70%', delay: '1.8s' },

                { left: '88%', top: '62%', delay: '1.1s' },

            ];

            return (
                <div className="fixed inset-0 pointer-events-none z-0">
                    {stars.map((s, i) => (
                        <span
                            key={i}
                            className="sparkle"
                            style={{ left: s.left, top: s.top, animationDelay: s.delay }}
                        />
                    ))}
                </div>
            );
        };

        // =========================
        // UI Components
        // =========================
        const SectionTitle = ({ icon, title, subtitle }) => (
            <div className="mb-6">
                <div className="flex items-center gap-3 mb-2">
                    <div className="w-11 h-11 rounded-2xl glass flex items-center justify-center text-violet-500 animate-float">

                    <div>

                                                <stop offset="100%" stopColor="#f9a8d4" stopOpacity={0.10} />
                                            </linearGradient>
                                        </defs>
                                        <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="rgba(180, 167, 216, 0.22)" />
                                        <XAxis
                                            dataKey="date"
                                            axisLine={false}
                                            tickLine={false}
                                            tick={{ fontSize: 12, fill: '#7d7599', fontWeight: 800 }}
                                            dy={10}
                                        />
                                        <YAxis
                                            domain={[0, 'auto']}
                                            axisLine={false}
                                            tickLine={false}
                                            tick={{ fontSize: 11, fill: '#9f98b6', fontWeight: 700 }}
                                        />
                                        <Tooltip
                                            contentStyle={{
                                                borderRadius: '18px',
                                                border: '1px solid rgba(255,255,255,0.85)',
                                                backdropFilter: 'blur(8px)',
                                                background: 'rgba(255,255,255,0.92)',
                                                boxShadow: '0 12px 28px rgba(184,168,221,0.18)',
                                                color: '#4f466b'
                                            }}
                                            labelStyle={{ color: '#7c3aed', fontWeight: 800 }}
                                        />
                                        <Area
                                            type="monotone"
                                            dataKey="score"
                                            stroke="#8b5cf6"
                                            strokeWidth={4}
                                            fill="url(#scoreGradA)"
                                            animationDuration={1200}
                                        />
                                    </AreaChart>
                                </ResponsiveContainer>
                            ) : (
                                <div className="h-full rounded-[2rem] border border-dashed border-violet-100 flex flex-col items-center justify-center text-slate-400 font-black">
                                    บันทึกคะแนนเพื่อดูกราฟ
                                </div>
                            )}
                        </div>
                    </div>

                    <div className="grid grid-cols-1 xl:grid-cols-5 gap-6">
                        <div ref={scoreFormRef} className="xl:col-span-2 glass-strong neon-card rounded-[2rem] p-6 md:p-8 card-hover">
                            <SectionTitle icon="calendar" title="บันทึกคะแนน" subtitle="กรอกวันที่ คะแนน และหมายเหตุ" />

                            {editingScoreId && (
                                <div className="mb-4 rounded-2xl border border-amber-100 bg-amber-50 px-4 py-3 text-amber-600 font-bold text-sm flex items-center justify-between gap-3">
                                    <span>กำลังแก้ไขรายการคะแนน</span>
                                    <button
                                        type="button"
                                        onClick={handleCancelEditScore}
                                        className="text-xs px-3 py-1 rounded-full bg-white border border-amber-100 hover:bg-amber-100 transition"
                                    >
                                        ยกเลิก
                                    </button>
                                </div>
                            )}

                            <form
                                onSubmit={(e) => {
                                    sfx.playClick();
                                    handleAddScore(e);
                                }}
                                className="space-y-5"
                            >
                                <input
                                    type="date"
                                    className="glass-input rounded-2xl px-5 py-4 font-black"
                                    value={newScore.date}
                                    onChange={(e) => setNewScore({ ...newScore, date: e.target.value })}
                                />

                                <input
                                    type="number"
                                    step="0.1"
                                    className="glass-input rounded-[1.8rem] px-5 py-6 font-black text-center text-5xl md:text-6xl text-violet-500"
                                    placeholder="0.0"
                                    value={newScore.score}
                                    onChange={(e) => setNewScore({ ...newScore, score: e.target.value })}
                                />

                                <input
                                    type="text"
                                    className="glass-input rounded-2xl px-5 py-4 font-bold"
                                    placeholder="วิชา / หมายเหตุ"
                                    value={newScore.note}
                                    onChange={(e) => setNewScore({ ...newScore, note: e.target.value })}
                                />

                                {success && (
                                    <div className="rounded-2xl border border-emerald-100 bg-emerald-50 px-4 py-3 text-emerald-500 font-black text-center animate-scale-in">
                                        {success}
                                    </div>
                                )}

                                <button
                                    disabled={loading}
                                    className="neon-btn w-full rounded-[1.6rem] px-5 py-5 font-black text-xl text-white bg-gradient-to-r from-sky-400 via-violet-400 to-pink-400 shadow-[0_14px_28px_rgba(190,169,228,0.24)] disabled:opacity-60"
                                >
                                    {loading ? 'กำลังบันทึก...' : (editingScoreId ? 'บันทึกการแก้ไข' : 'บันทึกคะแนน')}
                                </button>
                            </form>
                        </div>

                        <div className="xl:col-span-3 glass-strong neon-card rounded-[2rem] overflow-hidden card-hover min-h-[520px]">
                            <div className="px-6 py-5 border-b border-violet-100 flex items-center justify-between">
                                <div>
                                    <div className="text-slate-500 text-xs font-black uppercase tracking-[0.2em]">History</div>
                                    <h2 className="display-font text-2xl font-extrabold text-slate-700">ประวัติย้อนหลัง</h2>
                                </div>
                                <span className="status-chip bg-white/60 text-slate-500 border border-violet-100">
                                    Scroll
                                </span>
                            </div>

                            <div className="p-5 space-y-4 max-h-[620px] overflow-y-auto custom-scrollbar">
                                {myScores.length === 0 ? (
                                    <div className="h-[360px] flex items-center justify-center text-slate-400 font-black text-xl">
                                        ยังไม่มีประวัติคะแนน
                                    </div>
                                ) : (
                                    [...myScores].reverse().map((s, idx) => (
                                        <div
                                            key={s.id}
                                            className="rounded-[1.7rem] glass p-5 md:p-6 flex items-center justify-between gap-4 card-hover"
                                        >
                                            <div className="flex items-center gap-4 min-w-0">
                                                <div className="flex flex-col items-center shrink-0">
                                                    <div className={cn(
                                                        "w-20 h-20 rounded-[1.4rem] flex flex-col items-center justify-center text-white shadow-lg",
                                                        idx % 3 === 0 && "bg-gradient-to-br from-sky-300 to-blue-300",
                                                        idx % 3 === 1 && "bg-gradient-to-br from-violet-300 to-fuchsia-300",
                                                        idx % 3 === 2 && "bg-gradient-to-br from-pink-300 to-rose-300"
                                                    )}>
                                                        <span className="text-2xl font-black leading-none">
                                                            {new Date(s.date).getDate()}
                                                        </span>
                                                        <span className="text-[10px] font-black uppercase tracking-[0.18em] opacity-90 mt-2">
                                                            {new Date(s.date).toLocaleDateString('th-TH', { month: 'short' })}
                                                        </span>
                                                    </div>

                                                    <div className="mt-2 flex items-center gap-2 text-[11px] font-bold">
                                                        <button
                                                            type="button"
                                                            onClick={() => {
                                                                sfx.playClick();
                                                                handleEditScore(s);
                                                            }}
                                                            className="text-sky-500 hover:text-sky-600 transition"
                                                        >
                                                            แก้ไข
                                                        </button>
                                                        <span className="text-slate-300">|</span>
                                                        <button
                                                            type="button"
                                                            onClick={() => handleDeleteScore(s.id)}
                                                            className="text-rose-400 hover:text-rose-500 transition"
                                                        >
                                                            ลบ
                                                        </button>
                                                    </div>
                                                </div>

                                                <div className="min-w-0">
                                                    <p className="font-black text-slate-700 text-lg line-clamp-1">
                                                        {s.note || 'ไม่มีหมายเหตุ'}
                                                    </p>
                                                    <p className="text-sm text-slate-500 font-bold mt-1">
                                                        {formatThaiDate(s.date)}
                                                    </p>
                                                </div>
                                            </div>

                                            <div className="text-right shrink-0">
                                                <div className="text-4xl md:text-5xl font-black display-font text-violet-500 score-glow">
                                                    {s.score}
                                                </div>
                                                <div className="text-xs uppercase tracking-[0.2em] text-slate-400 font-black mt-1">
                                                    Score
                                                </div>
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>
                        </div>
                    </div>
                </main>

                <footer className="text-center py-10 text-slate-400 text-xs font-black uppercase tracking-[0.4em]">
                    Real-time Pastel Tracking System
                </footer>
            </div>
        );

        // =========================
        // Main App
        // =========================
        const App = () => {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('login');
            const [loggedInStudent, setLoggedInStudent] = useState(null);
            const [students, setStudents] = useState([]);
            const [scores, setScores] = useState([]);
            const [loginForm, setLoginForm] = useState({ username: '', password: '' });
            const [newStudent, setNewStudent] = useState({ name: '', dob: '', startDate: getLocalDateString() });
            const [newScore, setNewScore] = useState({ date: getLocalDateString(), score: '', note: '' });
            const [editingScoreId, setEditingScoreId] = useState(null);
            const [bulkInput, setBulkInput] = useState('');
            const [error, setError] = useState('');
            const [success, setSuccess] = useState('');
            const [loading, setLoading] = useState(false);

            const sfx = useSoundFX();
            const scoreFormRef = useRef(null);

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        const cleanConfig = { ...firebaseConfig, apiKey: firebaseConfig.apiKey.trim() };

                        if (!firebase.apps.length) {
                            firebase.initializeApp(cleanConfig);
                        }

                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await firebase.auth().signInWithCustomToken(__initial_auth_token);
                        } else {
                            await firebase.auth().signInAnonymously();
                        }
                    } catch (err) {
                        console.error("Auth initialization error:", err);
                        sfx.playError();

                        if (err.code === 'auth/api-key-not-valid') {
                            setError("⚠️ API Key ไม่ถูกต้อง\nโปรดตรวจสอบการคัดลอก และดูว่ามีการตั้งค่า Restrictions ใน Google Cloud Console หรือไม่");
                        } else if (err.code === 'auth/operation-not-allowed') {
                            setError("⚠️ ยังไม่ได้เปิด Anonymous Auth ใน Firebase Console");
                        } else {
                            setError(`เกิดข้อผิดพลาดในการเชื่อมต่อเซิร์ฟเวอร์\n(${err.message || err.code})`);
                        }
                    }
                };

                initAuth();

                const unsubscribe = firebase.auth().onAuthStateChanged((u) => setUser(u));
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user || !firebase.apps.length) return;

                const db = firebase.firestore();
                const studentsRef = db.collection('artifacts').doc(currentAppId).collection('public').doc('data').collection('students');
                const scoresRef = db.collection('artifacts').doc(currentAppId).collection('public').doc('data').collection('scores');

                const unsubStudents = studentsRef.onSnapshot((snapshot) => {
                    setStudents(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                }, (err) => {
                    console.error("Sync error:", err);
                    setError("ไม่มีสิทธิ์เข้าถึงฐานข้อมูล (ตรวจสอบ Firestore Rules)");
                });

                const unsubScores = scoresRef.onSnapshot((snapshot) => {
                    setScores(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                }, (err) => {
                    console.error("Scores sync error:", err);
                });

                return () => {
                    unsubStudents();
                    unsubScores();
                };
            }, [user]);

            const showSuccess = (message) => {
                setSuccess(message);
                sfx.playSuccess();
                setTimeout(() => setSuccess(''), 2500);
            };

            const showError = (message) => {
                setError(message);
                sfx.playError();
            };

            const handleLogin = async (e) => {
                e.preventDefault();
                setError('');
                setLoading(true);

                try {
                    const db = firebase.firestore();

                    const adminSnapshot = await db.collection('admin').get();
                    const adminDataList = adminSnapshot.docs.map(doc => doc.data());

                    const matchedAdmin = adminDataList.find(admin =>
                        admin.username === loginForm.username &&
                        admin.password === loginForm.password
                    );

                    if (matchedAdmin) {
                        sfx.playLogin();
                        setView('teacher_settings');
                        setLoading(false);
                        return;
                    }

                    const student = students.find(s =>
                        s.name &&
                        s.name.trim().toLowerCase() === loginForm.username.trim().toLowerCase() &&
                        s.dob === loginForm.password
                    );

                    if (student) {
                        sfx.playLogin();
                        setLoggedInStudent(student);
                        setView('parent_dashboard');
                    } else {
                        showError('ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง');
                    }
                } catch (err) {
                    console.error("Login verify error:", err);
                    showError("เกิดข้อผิดพลาดในการตรวจสอบข้อมูล (ตรวจสอบว่าได้แก้ Rules ตามคำแนะนำหรือยัง)");
                } finally {
                    setLoading(false);
                }
            };

            const handleAddStudent = async (e) => {
                e.preventDefault();
                setError('');

                if (!newStudent.name || !newStudent.dob) {
                    showError('กรุณากรอกข้อมูลให้ครบถ้วน');
                    return;
                }

                setLoading(true);
                try {
                    const db = firebase.firestore();
                    const studentsRef = db.collection('artifacts').doc(currentAppId).collection('public').doc('data').collection('students');

                    await studentsRef.add({
                        ...newStudent,
                        createdAt: new Date().toISOString()
                    });

                    setNewStudent({ name: '', dob: '', startDate: getLocalDateString() });
                    showSuccess('ลงทะเบียนสำเร็จ');
                } catch (err) {
                    console.error("Add student error:", err);
                    showError('ไม่สามารถบันทึกข้อมูลได้: ' + err.code);
                } finally {
                    setLoading(false);
                }
            };

            const handleBulkImport = async () => {
                if (!bulkInput.trim()) return;

                setLoading(true);
                setError('');

                try {
                    const db = firebase.firestore();
                    const rows = bulkInput.trim().split('\n');

                    for (const row of rows) {
                        const cols = row.split('\t');
                        if (cols.length >= 2) {
                            await db.collection('artifacts').doc(currentAppId).collection('public').doc('data').collection('students').add({
                                name: cols[0].trim(),
                                dob: cols[1].trim(),
                                startDate: cols[2]?.trim() || getLocalDateString(),
                                createdAt: new Date().toISOString()
                            });
                        }
                    }

                    setBulkInput('');
                    showSuccess('นำเข้าสำเร็จ');
                } catch (err) {
                    console.error(err);
                    showError('นำเข้าล้มเหลว');
                } finally {
                    setLoading(false);
                }
            };

            const handleDeleteStudent = async (id) => {
                if (!confirm('ยืนยันการลบนักเรียน?')) return;

                try {
                    const db = firebase.firestore();
                    await db.collection('artifacts').doc(currentAppId).collection('public').doc('data').collection('students').doc(id).delete();
                    showSuccess('ลบข้อมูลสำเร็จ');
                } catch (err) {
                    console.error(err);
                    showError('ลบข้อมูลไม่สำเร็จ');
                }
            };

            const handleAddScore = async (e) => {
                e.preventDefault();

                if (!newScore.score || !loggedInStudent) {
                    showError('กรุณากรอกคะแนนให้ถูกต้อง');
                    return;
                }

                setLoading(true);
                try {
                    const db = firebase.firestore();
                    const scoresRef = db.collection('artifacts').doc(currentAppId).collection('public').doc('data').collection('scores');

                    if (editingScoreId) {
                        await scoresRef.doc(editingScoreId).update({
                            date: newScore.date,
                            score: parseFloat(newScore.score),
                            note: newScore.note,
                            updatedAt: new Date().toISOString()
                        });
                        showSuccess('แก้ไขคะแนนสำเร็จ');
                    } else {
                        await scoresRef.add({
                            studentId: loggedInStudent.id,
                            date: newScore.date,
                            score: parseFloat(newScore.score),
                            note: newScore.note,
                            timestamp: new Date().toISOString()
                        });
                        showSuccess('บันทึกสำเร็จ');
                    }

                    setNewScore({ date: getLocalDateString(), score: '', note: '' });
                    setEditingScoreId(null);
                } catch (err) {
                    console.error(err);
                    showError(editingScoreId ? 'ไม่สามารถแก้ไขคะแนนได้' : 'ไม่สามารถบันทึกคะแนนได้');
                } finally {
                    setLoading(false);
                }
            };

            const handleEditScore = (scoreItem) => {
                setNewScore({
                    date: scoreItem.date,
                    score: String(scoreItem.score ?? ''),
                    note: scoreItem.note || ''
                });
                setEditingScoreId(scoreItem.id);

                if (scoreFormRef.current) {
                    scoreFormRef.current.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }

                showSuccess('กำลังแก้ไขรายการคะแนน');
            };

            const handleDeleteScore = async (scoreId) => {
                if (!confirm('ยืนยันการลบรายการคะแนนนี้?')) return;

                try {
                    const db = firebase.firestore();
                    await db
                        .collection('artifacts')
                        .doc(currentAppId)
                        .collection('public')
                        .doc('data')
                        .collection('scores')
                        .doc(scoreId)
                        .delete();

                    if (editingScoreId === scoreId) {
                        setEditingScoreId(null);
                        setNewScore({ date: getLocalDateString(), score: '', note: '' });
                    }

                    sfx.playDelete();
                    showSuccess('ลบคะแนนสำเร็จ');
                } catch (err) {
                    console.error(err);
                    showError('ลบคะแนนไม่สำเร็จ');
                }
            };

            const handleCancelEditScore = () => {
                setEditingScoreId(null);
                setNewScore({ date: getLocalDateString(), score: '', note: '' });
            };

            const handleLogout = () => {
                setView('login');
                setLoggedInStudent(null);
                setLoginForm({ username: '', password: '' });
                setError('');
                setSuccess('');
                setEditingScoreId(null);
                setNewScore({ date: getLocalDateString(), score: '', note: '' });
            };

            const myScores = useMemo(() => {
                if (!loggedInStudent) return [];
                return scores
                    .filter(s => s.studentId === loggedInStudent.id)
                    .sort((a, b) => new Date(a.date) - new Date(b.date));
            }, [scores, loggedInStudent]);

            const streakCount = useMemo(() => {
                if (myScores.length === 0) return 0;

                const dates = new Set(myScores.map(s => s.date));
                let streak = 0;
                let checkDate = new Date();
                checkDate.setHours(0, 0, 0, 0);

                if (checkDate.getDay() === 0) checkDate.setDate(checkDate.getDate() - 2);
                if (checkDate.getDay() === 6) checkDate.setDate(checkDate.getDate() - 1);

                while (true) {
                    const ds = getLocalDateString(checkDate);
                    if (dates.has(ds)) {
                        streak++;
                        checkDate.setDate(checkDate.getDate() - 1);
                        if (checkDate.getDay() === 0) checkDate.setDate(checkDate.getDate() - 2);
                        if (checkDate.getDay() === 6) checkDate.setDate(checkDate.getDate() - 1);
                    } else {
                        break;
                    }
                }

                return streak;
            }, [myScores]);

            const badgesEarned = useMemo(() => {
                const b = [];
                const total = myScores.length;
                const avg = total > 0 ? (myScores.reduce((acc, c) => acc + c.score, 0) / total) : 0;

                if (total >= 1) b.push({ id: 'first', title: 'ก้าวแรก', icon: 'medal' });
                if (streakCount >= 5) b.push({ id: 'streak5', title: '5 วันติด', icon: 'flame' });
                if (total >= 20) b.push({ id: 'king', title: 'เจ้าแห่งวินัย', icon: 'award' });

                if (total >= 3) {
                    const last3 = myScores.slice(-3);
                    if (last3.every(s => s.score > avg)) b.push({ id: 'flyer', title: 'ดาวรุ่ง', icon: 'rocket' });
                }

                if (total >= 5) {
                    const last5 = myScores.slice(-5);
                    const l5Avg = last5.reduce((acc, c) => acc + c.score, 0) / 5;
                    if (l5Avg >= 80) b.push({ id: 'perfect', title: 'ไร้ที่ติ', icon: 'crown' });
                }

                return b;
            }, [myScores, streakCount]);

            const missingDates = useMemo(() => {
                if (!loggedInStudent) return [];

                const missing = [];
                const yest = new Date();
                yest.setDate(yest.getDate() - 1);
                yest.setHours(0, 0, 0, 0);

                const parts = loggedInStudent.startDate?.split('-') || [];
                const start = parts.length === 3
                    ? new Date(parts[0], parts[1] - 1, parts[2])
                    : new Date(yest.getTime() - 14 * 86400000);

                start.setHours(0, 0, 0, 0);

                let check = new Date(yest);
                while (check >= start) {
                    const ds = getLocalDateString(check);
                    if (!myScores.some(s => s.date === ds)) {
                        missing.push(check.toLocaleDateString('th-TH', { day: 'numeric', month: 'short' }));
                    }
                    check.setDate(check.getDate() - 1);
                    if (missing.length > 30) break;
                }

                return missing;
            }, [myScores, loggedInStudent]);

            const stats = useMemo(() => {
                if (!loggedInStudent || myScores.length === 0) {
                    return { avg: "0.0", total: 0, max: 0 };
                }

                return {
                    avg: (myScores.reduce((acc, c) => acc + c.score, 0) / myScores.length).toFixed(1),
                    total: myScores.length,
                    max: Math.max(...myScores.map(s => s.score))
                };
            }, [myScores, loggedInStudent]);

            const chartDataArray = useMemo(() => {
                return [...myScores].map(s => ({
                    date: new Date(s.date).toLocaleDateString('th-TH', { day: 'numeric', month: 'short' }),
                    score: s.score
                }));
            }, [myScores]);

            return (
                <div className="antialiased">
                    {view === 'login' && (
                        <LoginPage
                            loginForm={loginForm}
                            setLoginForm={setLoginForm}
                            handleLogin={handleLogin}
                            error={error}
                            loading={loading}
                            sfx={sfx}
                        />
                    )}

                    {view === 'teacher_settings' && (
                        <TeacherSettings
                            students={students}
                            success={success}
                            error={error}
                            newStudent={newStudent}
                            setNewStudent={setNewStudent}
                            handleAddStudent={handleAddStudent}
                            bulkInput={bulkInput}
                            setBulkInput={setBulkInput}
                            handleBulkImport={handleBulkImport}
                            handleDeleteStudent={handleDeleteStudent}
                            handleLogout={handleLogout}
                            loading={loading}
                            sfx={sfx}
                        />
                    )}

                    {view === 'parent_dashboard' && (
                        <ParentDashboard
                            loggedInStudent={loggedInStudent}
                            streakCount={streakCount}
                            missingDates={missingDates}
                            badgesEarned={badgesEarned}
                            stats={stats}
                            chartData={chartDataArray}
                            newScore={newScore}
                            setNewScore={setNewScore}
                            handleAddScore={handleAddScore}
                            handleEditScore={handleEditScore}
                            handleDeleteScore={handleDeleteScore}
                            handleCancelEditScore={handleCancelEditScore}
                            editingScoreId={editingScoreId}
                            myScores={myScores}
                            handleLogout={handleLogout}
                            success={success}
                            loading={loading}
                            sfx={sfx}
                            scoreFormRef={scoreFormRef}
                        />
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
